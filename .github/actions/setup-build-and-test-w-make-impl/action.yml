name: setup-build-and-test-w-make-impl
inputs:
  setup_toolchain_extra:
    required: false
    default: ''
  configure_extra:
    required: false
    default: ''
  save_boost_cache:
    required: false
    default: false
  run_tests:
    required: false
    default: true
  job_name:
    required: false
runs:
  using: composite
  steps:
  - uses: "./.github/actions/base-build-setup"
    with:
      save_boost_cache: "${{ inputs.save_boost_cache }}"
      setup_toolchain_extra: "${{ inputs.setup_toolchain_extra }}"
  - uses: "./.github/actions/test-build-setup"
  # It is unclear whether github.sha is the right thing generally. It is
  # for scheduled workflows (as it's HEAD of the branch). But for pull requests
  # it's a bit murkier (looking for some merge commits).
  # For now leave it at that and hope that the fallback does the right thing.
  - name: Cache build
    uses: actions/cache@v4
    with:
      key: v3-build-cache-${{ inputs.job_name }}.${{ inputs.setup_toolchain_extra }}.${{ inputs.configure_extra }}-${{ runner.arch }}-${{ github.ref_name }}-${{ github.sha }}
      path: build.tar.zstd
      restore-keys: |
        v3-build-cache-${{ inputs.job_name }}.${{ inputs.setup_toolchain_extra }}.${{ inputs.configure_extra }}-${{ runner.arch }}-${{ github.ref_name }}-
        v3-build-cache-${{ inputs.job_name }}.${{ inputs.setup_toolchain_extra }}.${{ inputs.configure_extra }}-${{ runner.arch }}-${{ github.base_ref }}-
  # Would be nice to use the cache action output, but we want to unpack even on
  # restore_keys hit.
  - name: Unpack build cache
    run: |-
      if [ -f  "build.tar.zstd" ] ; then
        echo "Decompressing build cache"
        zstd --decompress --stdout build.tar.zstd | tar xf -
        rm build.tar.zstd
        find build | wc -l
      fi
    shell: bash
  - name: Create build directory
    run: |-
      if [ ! -d build ] ; then echo "Creating build dir." ; mkdir -p build ; fi
    shell: bash
  - name: Autoreconf
    run: autoreconf -ivf
    working-directory: repo
    shell: bash
  - name: Configure
    run: |-
      ../repo/configure --enable-protobuf --with-android-sdk="$(pwd)/../sdk" ${{ inputs.configure_extra }}
    working-directory: build
    shell: bash
  - name: Build
    run: make -j4 V=0
    working-directory: build
    shell: bash
  - name: Compress build directory
    run: tar cf - build | zstd -T0 -3 > build.tar.zstd
    shell: bash
  - name: Build tests
    run: make -j4 check TESTS= V=0
    working-directory: build
    shell: bash
  - name: Run tests
    id: run-tests
    run: |-
      mkdir -p /tmp/test-results
      rm -f /tmp/test-results/*.xml
      export GTEST_OUTPUT=xml:/tmp/test-results/
      set +e
      make -j4 check V=1 VERBOSE=1
      rc=$?
      echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
      exit 0
    working-directory: build
    if: inputs.run_tests == 'true'
    shell: bash
  - name: Sanitize artifact name
    id: artifact-name
    if: inputs.run_tests == 'true' && (success() || failure())
    run: |-
      name="test-results-${{ inputs.job_name }}"
      name="${name//[:\"<>|*?\\\/]/-}"
      name="${name// /_}"
      echo "name=$name" >> "$GITHUB_OUTPUT"
    shell: bash
  - name: Upload test results
    if: inputs.run_tests == 'true' && (success() || failure())
    uses: actions/upload-artifact@v4
    with:
      name: ${{ steps.artifact-name.outputs.name }}
      path: /tmp/test-results/
      if-no-files-found: ignore
      retention-days: 14
  - name: Fail job on test failure
    if: steps.run-tests.outputs.exit_code != '0' && steps.run-tests.outputs.exit_code != ''
    run: exit 1
    shell: bash
