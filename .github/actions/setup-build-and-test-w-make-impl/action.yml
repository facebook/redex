name: setup-build-and-test-w-make-impl
inputs:
  setup_toolchain_extra:
    required: false
    default: ''
  configure_extra:
    required: false
    default: ''
  save_boost_cache:
    required: false
    default: false
  run_tests:
    required: false
    default: true
  job_name:
    required: false
runs:
  using: composite
  steps:
  - uses: "./.github/actions/base-build-setup"
    with:
      save_boost_cache: "${{ inputs.save_boost_cache }}"
      setup_toolchain_extra: "${{ inputs.setup_toolchain_extra }}"
  - uses: "./.github/actions/test-build-setup"
  # It is unclear whether github.sha is the right thing generally. It is
  # for scheduled workflows (as it's HEAD of the branch). But for pull requests
  # it's a bit murkier (looking for some merge commits).
  # For now leave it at that and hope that the fallback does the right thing.
  - name: Cache build
    uses: actions/cache@v4
    with:
      key: v3-build-cache-${{ inputs.job_name }}.${{ inputs.setup_toolchain_extra }}.${{ inputs.configure_extra }}-${{ runner.arch }}-${{ github.ref_name }}-${{ github.sha }}
      path: build.tar.zstd
      restore-keys: |
        v3-build-cache-${{ inputs.job_name }}.${{ inputs.setup_toolchain_extra }}.${{ inputs.configure_extra }}-${{ runner.arch }}-${{ github.ref_name }}-
        v3-build-cache-${{ inputs.job_name }}.${{ inputs.setup_toolchain_extra }}.${{ inputs.configure_extra }}-${{ runner.arch }}-${{ github.base_ref }}-
  # Would be nice to use the cache action output, but we want to unpack even on
  # restore_keys hit.
  - name: Unpack build cache
    run: |-
      if [ -f  "build.tar.zstd" ] ; then
        echo "Decompressing build cache"
        zstd --decompress --stdout build.tar.zstd | tar xf -
        rm build.tar.zstd
        find build | wc -l
      fi
    shell: bash
  - name: Create build directory
    run: |-
      if [ ! -d build ] ; then echo "Creating build dir." ; mkdir -p build ; fi
    shell: bash
  - name: Autoreconf
    run: autoreconf -ivf
    working-directory: repo
    shell: bash
  - name: Configure
    run: |-
      ../repo/configure --enable-protobuf --with-android-sdk="$(pwd)/../sdk" ${{ inputs.configure_extra }}
    working-directory: build
    shell: bash
  - name: Build
    run: |
      set -x
      make -j"$(nproc)" V=0
    working-directory: build
    shell: bash
  - name: Compress build directory
    run: tar cf - build | zstd -T0 -3 > build.tar.zstd
    shell: bash
  - name: Build tests
    run: |
      set -x
      make -j"$(nproc)" check TESTS= V=0
    working-directory: build
    shell: bash
  - name: Run tests
    id: run-tests
    run: |-
      mkdir -p /tmp/test-results
      rm -f /tmp/test-results/*.xml
      export GTEST_OUTPUT=xml:/tmp/test-results/
      set +e
      set -x
      make -j"$(nproc)" check V=0
      rc=$?
      echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
      exit 0
    working-directory: build
    if: inputs.run_tests == 'true'
    shell: bash
  - name: Sanitize artifact name
    id: artifact-name
    if: inputs.run_tests == 'true' && (success() || failure())
    run: |-
      name="test-results-${{ inputs.job_name }}"
      name="${name//[:\"<>|*?\\\/]/-}"
      name="${name// /_}"
      echo "name=$name" >> "$GITHUB_OUTPUT"
    shell: bash
  - name: Upload test results
    if: inputs.run_tests == 'true' && (success() || failure())
    uses: actions/upload-artifact@v4
    with:
      name: ${{ steps.artifact-name.outputs.name }}
      path: /tmp/test-results/
      if-no-files-found: ignore
      retention-days: 14
  - name: Test summary
    if: inputs.run_tests == 'true' && (success() || failure())
    run: |-
      python3 - <<'PYEOF'
      import glob
      import os
      import xml.etree.ElementTree as ET

      xml_files = sorted(glob.glob("/tmp/test-results/*.xml"))
      if not xml_files:
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write("## 🧪 Test Results\n\nNo test result XML files found.\n")
          raise SystemExit(0)

      total_tests = 0
      total_failures = 0
      total_disabled = 0
      total_errors = 0
      total_time = 0.0
      failed_suites = []  # [(suite_name, [(test_name, message)])]
      passing_suites = []

      for xml_file in xml_files:
          try:
              tree = ET.parse(xml_file)
          except ET.ParseError:
              failed_suites.append((os.path.basename(xml_file), [("XML parse error", "Malformed XML — test may have crashed")]))
              continue
          root = tree.getroot()
          for testsuite in root.iter("testsuite"):
              name = testsuite.get("name", os.path.basename(xml_file))
              tests = int(testsuite.get("tests", 0))
              failures = int(testsuite.get("failures", 0))
              disabled = int(testsuite.get("disabled", 0))
              errors = int(testsuite.get("errors", 0))
              time_taken = float(testsuite.get("time", 0))
              total_tests += tests
              total_failures += failures
              total_disabled += disabled
              total_errors += errors
              total_time += time_taken
              suite_failures = []
              for testcase in testsuite.findall("testcase"):
                  failure = testcase.find("failure")
                  if failure is not None:
                      tc_name = testcase.get("name", "unknown")
                      msg = (failure.get("message") or failure.text or "").strip()
                      if len(msg) > 500:
                          msg = msg[:500] + "..."
                      suite_failures.append((tc_name, msg))
              if suite_failures:
                  failed_suites.append((name, suite_failures))
              elif tests > 0:
                  passing_suites.append(name)

      total_passed = total_tests - total_failures - total_errors
      icon = "❌" if (total_failures + total_errors) > 0 else "✅"
      parts = [f"{total_passed} passed"]
      if total_failures + total_errors > 0:
          parts.append(f"{total_failures + total_errors} failed")
      if total_disabled > 0:
          parts.append(f"{total_disabled} skipped")

      lines = [f"## {icon} Test Results: {', '.join(parts)}", ""]
      lines.append(f"**{len(xml_files)}** test binaries | **{total_time:.1f}s** total time")
      lines.append("")

      for suite_name, failures in failed_suites:
          lines.append(f"<details>")
          lines.append(f"<summary>❌ {suite_name} ({len(failures)} failure{'s' if len(failures) != 1 else ''})</summary>")
          lines.append("")
          for tc_name, msg in failures:
              lines.append(f"**{tc_name}**")
              if msg:
                  lines.append(f"```")
                  lines.append(msg)
                  lines.append(f"```")
              lines.append("")
          lines.append("</details>")
          lines.append("")

      if passing_suites:
          lines.append("<details>")
          lines.append(f"<summary>✅ {len(passing_suites)} passing test suites</summary>")
          lines.append("")
          lines.append(", ".join(sorted(passing_suites)))
          lines.append("")
          lines.append("</details>")
          lines.append("")

      summary = "\n".join(lines)
      # Respect 1 MiB limit
      if len(summary.encode("utf-8")) > 1_000_000:
          summary = summary[:999_000] + "\n\n⚠️ Output truncated (1 MiB limit)\n"

      with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
          f.write(summary)
      PYEOF
    shell: bash
  - name: Fail job on test failure
    if: steps.run-tests.outputs.exit_code != '0' && steps.run-tests.outputs.exit_code != ''
    run: exit 1
    shell: bash
