name: debian-based-image-build-setup
inputs:
  mode_32:
    required: false
    default: false
  install_clang:
    required: false
    default: false
  install_clang_llvm_org:
    required: false
    default: -1
runs:
  using: composite
  steps:
  - name: Update Apt Data
    run: sudo apt-get -qq update || ( apt-get -qq update && apt-get -qq install --no-install-recommends -y sudo ; )
    shell: bash
  - name: Install tools
    run: sudo apt-get install -qq --no-install-recommends -y zstd tar curl python3
    shell: bash
  - name: Install git-restore-mtime
    # The GitHub Actions runner ships a Git version newer than the distro's,
    # which can break the distro's git-restore-mtime package. Install a
    # newer version directly from upstream. Pinned to the commit SHA of
    # release v2025.08 so the upstream tag cannot silently move under us.
    run: |
      sudo curl -fsSL -o /usr/local/bin/git-restore-mtime https://raw.githubusercontent.com/MestreLion/git-tools/b5822d297b3ca4a3b6574e78327a464790b14937/git-restore-mtime
      sudo chmod +x /usr/local/bin/git-restore-mtime
    shell: bash
  - name: Add 32-bit Arch
    run: sudo dpkg --add-architecture i386 && sudo apt-get update
    if: inputs.mode_32 == 'true'
    shell: bash
  - name: Install Clang
    run: sudo apt-get install -qq -y --no-install-recommends clang
    if: inputs.install_clang == 'true'
    shell: bash
  - name: Install Clang (apt.llvm.org)
    run: |-
      sudo apt-get install -qq -y --no-install-recommends lsb-release software-properties-common
      sudo /bin/bash -c "$(wget -O - https://apt.llvm.org/llvm.sh | sed -e 's/^add-apt-repository.*$/& -y\n& -y/')"
      ls /usr/bin/clang*
    if: 0 == inputs.install_clang_llvm_org
    shell: bash

  - name: Install Clang (apt.llvm.org)
    run: |-
      sudo apt-get install -qq -y --no-install-recommends lsb-release software-properties-common
      sudo /bin/bash -c "$(wget -O - https://apt.llvm.org/llvm.sh | sed -e 's/^add-apt-repository.*$/& -y\n& -y/')" "llvm.sh" ${{ inputs.install_clang_llvm_org }}
      ls /usr/bin/clang*
    if: -1 != inputs.install_clang_llvm_org && 0 != inputs.install_clang_llvm_org
    shell: bash
